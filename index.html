<!doctype html>
<html>

<head>
	<base target="_top" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<script src="https://cdn.tailwindcss.com"></script>
	<style>
		@import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap");

		body {
			font-family: "IBM Plex Sans Thai", sans-serif;
			overscroll-behavior: none;
		}

		.mono {
			font-family: "JetBrains Mono", monospace;
			font-weight: 600;
		}

		.blob {
			position: fixed;
			border-radius: 50%;
			filter: blur(80px);
			opacity: 0.35;
			pointer-events: none;
			z-index: 0;
		}

		.glass-card {
			background: rgba(255, 255, 255, 0.72);
			backdrop-filter: blur(20px);
			-webkit-backdrop-filter: blur(20px);
			border: 1.5px solid rgba(255, 255, 255, 0.9);
			box-shadow:
				0 4px 32px rgba(236, 72, 153, 0.1),
				0 1.5px 8px rgba(236, 72, 153, 0.06),
				inset 0 1px 0 rgba(255, 255, 255, 0.8);
		}

		.pink-input:focus {
			box-shadow: 0 0 0 4px rgba(244, 114, 182, 0.18);
		}

		.field-label {
			font-size: 0.7rem;
			font-weight: 500;
			letter-spacing: 0.08em;
			text-transform: uppercase;
			color: #f472b6;
		}

		@keyframes fadeUp {
			from {
				opacity: 0;
				transform: translateY(18px);
			}

			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		.fade-up {
			animation: fadeUp 0.55s cubic-bezier(0.22, 0.68, 0, 1.2) both;
		}

		.fade-up-1 {
			animation-delay: 0.05s;
		}

		.fade-up-2 {
			animation-delay: 0.13s;
		}

		.fade-up-3 {
			animation-delay: 0.22s;
		}

		.fade-up-4 {
			animation-delay: 0.3s;
		}

		@keyframes pulse-soft {

			0%,
			100% {
				opacity: 1;
			}

			50% {
				opacity: 0.5;
			}
		}

		.pulse-soft {
			animation: pulse-soft 1.5s ease-in-out infinite;
		}
	</style>
</head>

	<div class="blob" style="width:320px;height:320px;background:#fbcfe8;bottom:-60px;right:-60px;"></div>
	<div class="blob" style="width:200px;height:200px;background:#fde68a;bottom:80px;left:30px;opacity:0.18;"></div>

	<script>
		let searchId = 0;

		function resetUI() {
			searchId++;
			document.getElementById("resultCard")?.classList.add("hidden");
			document.getElementById("errorMsg").style.display = "none";
			document.getElementById("errorMsg").textContent = "";
			document.getElementById("spinner")?.classList.add("hidden");
		}

		function setInputColor(state) {
			inputEl.style.color =
				state === "found"
					? "#4ade80"
					: state === "notfound"
						? "#ff6467"
						: state === "error"
							? "#fcd34d"
							: "#1f2937";
		}

		function search() {
			const examId = document.getElementById("examID").value.trim();
			const phone = document.getElementById("phoneNO").value.trim();

			if (!examId || !phone) return;

			resetUI();
			const sid = searchId;

			document.getElementById("spinner")?.classList.remove("hidden");

			google.script.run
				.withSuccessHandler((res) => {
					if (sid !== searchId) return;
					document.getElementById("spinner")?.classList.add("hidden");

					if (res.found) {
						document.getElementById("resMembershipId").textContent = res.membershipId;
						document.getElementById("resultCard").classList.remove("hidden");
					} else {
						const err = document.getElementById("errorMsg");
						err.textContent = "ไม่พบข้อมูล";
						err.style.display = "block";
					}
				})
				.withFailureHandler(() => {
					if (sid !== searchId) return;
					document.getElementById("spinner")?.classList.add("hidden");
					const err = document.getElementById("errorMsg");
					err.textContent = "เกิดข้อผิดพลาด";
					err.style.display = "block";
				})
				.findID(examId, phone);
		}
	</script>
